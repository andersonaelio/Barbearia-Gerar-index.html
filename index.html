function totals(sel) {

  const discount = combo ? 15 : 0;
  return { price: full - discount, full, discount, min, combo };
}

function slotAvailable(day, barberId, idx) {
  if (day.full) return false;
  const b = barberId === "any" ? 1 : barberId.charCodeAt(1);
  const seed = (day.key.charCodeAt(0) + b * 2 + idx * 3) % (barberId === "any" ? 4 : 5);
  return !(seed === 0 || seed === 3);
}

function crc16(s) {
  let c = 0xffff;
  for (let i = 0; i < s.length; i++) {
    c ^= s.charCodeAt(i) << 8;
    for (let j = 0; j < 8; j++) c = (c & 0x8000 ? (c << 1) ^ 0x1021 : c << 1) & 0xffff;
  }
  return c.toString(16).toUpperCase().padStart(4, "0");
}
function pixPayload({ chave, nome, cidade, valor, txid = "GERAR" }) {
  const f = (id, v) => id + String(v.length).padStart(2, "0") + v;
  const mai = f("26", f("00", "br.gov.bcb.pix") + f("01", chave));
  const add = f("62", f("05", txid.slice(0, 25)));
  let p =
    f("00", "01") + mai + f("52", "0000") + f("53", "986") +
    (valor ? f("54", valor.toFixed(2)) : "") + f("58", "BR") +
    f("59", nome.slice(0, 25)) + f("60", cidade.slice(0, 15)) + add + "6304";
  return p + crc16(p);
}

function Agendamento() {
  const [step, setStep] = useState(1);
  const [services, setServices] = useState([]);
  const [barber, setBarber] = useState(null);
  const [day, setDay] = useState(null);
  const [time, setTime] = useState(null);
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [optin, setOptin] = useState(true);
  const [waitlist, setWaitlist] = useState(false);
  const [payMethod, setPayMethod] = useState(null); // "pix" | "local"
  const [payKind, setPayKind] = useState("total");   // "total" | "sinal"
  const [copied, setCopied] = useState(false);
  const [showMore, setShowMore] = useState(false);

  const t = totals(services);
  const serviceNames = services.map((s) => s.name).join(" + ");
  const toggleService = (s) =>
    setServices((prev) => (prev.some((x) => x.id === s.id) ? prev.filter((x) => x.id !== s.id) : [...prev, s]));

  const slots = useMemo(() => {
    if (!day || !barber) return [];
    return SLOTS.map((t, i) => ({ time: t, available: slotAvailable(day, barber.id, i) }));
  }, [day, barber]);
  const dayHasSlots = slots.some((s) => s.available);

  const payValue = payKind === "sinal" ? PAGAMENTO.sinal : t.price;
  const pixCode = useMemo(
    () => pixPayload({ chave: PAGAMENTO.chave, nome: PAGAMENTO.nome, cidade: PAGAMENTO.cidade, valor: payValue }),
    [payValue]
  );
  const copyPix = () => {
    try { navigator.clipboard.writeText(pixCode); } catch (e) {}
    setCopied(true); setTimeout(() => setCopied(false), 1800);
  };

  const canNext =
    (step === 1 && services.length > 0) || (step === 2 && barber) ||
    (step === 3 && (time || (day && !dayHasSlots))) ||
    (step === 4 && name.trim() && phone.replace(/\D/g, "").length >= 10);

  const next = () => {
    if (step === 3 && day && !dayHasSlots) { setWaitlist(true); setStep(6); return; }
    if (step === 4) { setStep(PAGAMENTO.ativo ? 5 : 6); return; }
    setStep((s) => Math.min(6, s + 1));
  };
  const back = () => setStep((s) => Math.max(1, s - 1));
  const reset = () => { setStep(1); setServices([]); setBarber(null); setDay(null); setTime(null); setName(""); setPhone(""); setOptin(true); setWaitlist(false); setPayMethod(null); setPayKind("total"); setCopied(false); };

  return (
    <div style={{ background: "repeating-linear-gradient(90deg, rgba(255,255,255,.014) 0 1px, transparent 1px 7px), radial-gradient(1200px 620px at 50% -8%, #20202B 0%, #15151A 46%, #0E0E12 100%)", minHeight: "100vh", fontFamily: SANS, color: C.ink, display: "flex", justifyContent: "center", padding: "0 0 40px" }}>

      <style>{`
        .ag-pulse{animation:agp .4s cubic-bezier(.2,.7,.3,1) both}
        @keyframes agp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        .ag-opt{transition:border-color .15s, background .15s, transform .12s}
        .ag-opt:hover{border-color:${C.brass}}
        .ag-opt:active{transform:scale(.99)}
        input{font-family:${SANS}}

        </div>

        {/* Progress */}
        {step < 6 && (
          <div style={{ display: "flex", gap: 6, padding: "16px 24px 0" }}>
            {STEP_LABELS.slice(0, 5).map((l, i) => (
              <div key={l} style={{ flex: 1 }}>
                <div style={{ height: 4, borderRadius: 3, background: i + 1 <= step ? C.ox : C.paper2 }} />
                <div style={{ fontSize: 9.5, color: i + 1 === step ? C.ox : C.inkSoft, marginTop: 5, fontWeight: i + 1 === step ? 600 : 400, letterSpacing: .5 }}>{l}</div>

        <div style={{ padding: "20px 24px" }}>
          {/* STEP 1 — serviços (multi) */}
          {step === 1 && (
            <div className="ag-pulse">
              <H>Seu melhor visual te espera</H>
              <div style={{ fontSize: 12.5, color: C.inkSoft, margin: "-10px 0 16px" }}>Escolha quantos quiser — a gente cuida de tudo.</div>
              <div style={{ display: "grid", gap: 10 }}>
                {SERVICES.filter((s) => s.grupo === "destaque" || showMore).map((s) => {
                  const sel = services.some((x) => x.id === s.id);
                  return (
                    <button key={s.id} className="ag-opt" onClick={() => toggleService(s)} style={optStyle(sel)}>
                      <div>
                        <div style={{ fontFamily: SERIF, fontWeight: 600, fontSize: 16 }}>{s.name}</div>
                        <div style={{ fontSize: 12, color: C.inkSoft, marginTop: 2, display: "flex", alignItems: "center", gap: 5 }}><Clock size={11} /> {fmtMin(s.min)}</div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <span style={{ fontFamily: MONO, fontWeight: 700, fontSize: 14.5, color: C.ink, background: "rgba(255,255,255,.06)", border: `1px solid ${C.line}`, borderRadius: 8, padding: "4px 9px" }}>{money(s.price)}</span>
                        <span style={{ width: 26, height: 26, borderRadius: "50%", display: "grid", placeItems: "center", background: sel ? C.ox : "transparent", border: `1.5px solid ${sel ? C.ox : C.line}`, color: sel ? "#fff" : C.inkSoft }}>
                          {sel ? <Check size={15} /> : <Plus size={15} />}
                        </span>
                      </div>
                    </button>
                  );
                })}
              </div>

              <button onClick={() => setShowMore((v) => !v)} style={{ marginTop: 10, width: "100%", background: "transparent", border: `1px dashed ${C.line}`, color: C.inkSoft, borderRadius: 10, padding: "11px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                {showMore ? "− ver menos" : "+ ver todos os serviços"}
              </button>

              {/* order-bump no agendamento: fechar o combo */}
              {services.some((x) => isCut(x.id)) && !(services.some((x) => x.id === "barba") && services.some((x) => x.id === "sobrancelha")) && (
                <button onClick={() => setServices((prev) => {
                    const ids = new Set(prev.map((x) => x.id));
                    const add = ["barba", "sobrancelha"].filter((id) => !ids.has(id)).map((id) => SERVICES.find((s) => s.id === id));
                    return [...prev, ...add];
                  })}
                  style={{ marginTop: 12, width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, background: "rgba(43,114,216,.12)", border: `1px solid ${C.brass}`, borderRadius: 10, padding: "12px 14px", cursor: "pointer", textAlign: "left" }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 9 }}>
                    <Sparkles size={16} color={C.brassL} style={{ flexShrink: 0 }} />
                    <span style={{ fontSize: 12.5, color: C.ink }}>Fecha o <b>combo</b> com Barba + Sobrancelha e economize {money(15)}</span>
                  </span>
                  <span style={{ display: "flex", alignItems: "center", gap: 4, color: C.brassL, fontWeight: 600, fontSize: 12.5, flexShrink: 0 }}><Plus size={14} /> Add</span>
                </button>
              )}

              {services.length > 0 && (
                <div style={{ marginTop: 16, background: C.card, border: `1px solid ${C.line}`, borderRadius: 10, padding: "13px 15px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ fontSize: 12, color: C.inkSoft }}>
                    {services.length} serviço{services.length > 1 ? "s" : ""} · {fmtMin(t.min)}
                    {t.combo && <span style={{ color: C.olive, marginLeft: 7, fontWeight: 600 }}>combo −{money(t.discount)}</span>}
                  </div>
                  <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                    {t.combo && <span style={{ fontFamily: MONO, fontSize: 13, color: C.inkSoft, textDecoration: "line-through" }}>{money(t.full)}</span>}
                    <span style={{ fontFamily: MONO, fontWeight: 700, fontSize: 21, color: C.ink, background: "rgba(255,255,255,.07)", border: `1px solid ${C.line}`, borderRadius: 9, padding: "5px 12px" }}>{money(t.price)}</span>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* STEP 2 — barbeiro */}
          {step === 2 && (
            <div className="ag-pulse">
              <H>Com quem?</H>
              <div style={{ display: "grid", gap: 10 }}>
                {BARBERS.map((b) => (
                  <button key={b.id} className="ag-opt" onClick={() => setBarber(b)} style={optStyle(barber?.id === b.id)}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{ width: 38, height: 38, borderRadius: "50%", background: b.id === "any" ? C.paper2 : C.oxDark, color: b.id === "any" ? C.inkSoft : C.brassL, display: "grid", placeItems: "center", fontFamily: SERIF, fontWeight: 600, fontSize: 15 }}>
                        {b.id === "any" ? <User size={17} /> : b.name[0]}
                      </div>
                      <span style={{ fontFamily: SERIF, fontWeight: 600, fontSize: 16 }}>{b.name}</span>
                    </div>
                    {barber?.id === b.id && <Check size={18} color={C.ox} />}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* STEP 3 — horário */}
          {step === 3 && (
            <div className="ag-pulse">
              <H>Quando?</H>
              <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4, marginBottom: 18 }}>
                {DAYS.map((d) => (
                  <button key={d.key} className="ag-opt" onClick={() => { setDay(d); setTime(null); }}
                    style={{ flexShrink: 0, width: 64, padding: "10px 0", borderRadius: 10, border: `1px solid ${day?.key === d.key ? C.ox : C.line}`, background: day?.key === d.key ? C.ox : C.card, color: day?.key === d.key ? "#fff" : C.ink, cursor: "pointer", textAlign: "center" }}>
                    <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1, opacity: .8 }}>{d.label}</div>
                    <div style={{ fontFamily: MONO, fontSize: 14, fontWeight: 600, marginTop: 3 }}>{d.date}</div>
                  </button>
                ))}
              </div>

              {!day && <Muted>Escolha um dia para ver os horários.</Muted>}

              {day && dayHasSlots && (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
                  {slots.map((s) => (
                    <button key={s.time} disabled={!s.available} onClick={() => setTime(s.time)}
                      className={s.available ? "ag-opt" : ""}
                      style={{ padding: "11px 0", borderRadius: 8, fontFamily: MONO, fontSize: 14, fontWeight: 600,
                        border: `1px solid ${time === s.time ? C.ox : s.available ? C.line : C.lineSoft}`,
                        background: time === s.time ? C.ox : s.available ? C.card : "transparent",
                        color: time === s.time ? "#fff" : s.available ? C.ink : C.line,
                        cursor: s.available ? "pointer" : "not-allowed",
                        textDecoration: s.available ? "none" : "line-through" }}>
                      {s.time}
                    </button>
                  ))}
                </div>
              )}

              {day && !dayHasSlots && (
                <div style={{ background: C.card, border: `1px solid ${C.brass}`, borderRadius: 10, padding: 18, textAlign: "center" }}>
                  <CalendarClock size={26} color={C.brass} style={{ margin: "0 auto 8px" }} />
                  <div style={{ fontFamily: SERIF, fontWeight: 600, fontSize: 17 }}>Dia lotado</div>
                  <div style={{ fontSize: 13, color: C.inkSoft, margin: "6px 0 0" }}>
                    {day.label} {day.date} não tem horário livre{barber?.id !== "any" ? ` com ${barber.name}` : ""}. Entre na lista de espera e a gente te avisa no WhatsApp se abrir vaga.
                  </div>
                </div>
              )}
            </div>
          )}

          {/* STEP 4 — dados */}
          {step === 4 && (
            <div className="ag-pulse">
              <H>Seus dados</H>
              <div style={{ display: "grid", gap: 14 }}>
                <Field label="Nome" icon={User}>
                  <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Como te chamamos?" style={inputStyle} />
                </Field>
                <Field label="WhatsApp" icon={Phone}>
                  <input value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="(48) 9 9999-9999" inputMode="tel" style={inputStyle} />
                </Field>
                <label style={{ display: "flex", gap: 11, alignItems: "flex-start", cursor: "pointer", background: C.card, border: `1px solid ${optin ? C.olive : C.line}`, borderRadius: 10, padding: "13px 14px" }}>
                  <span style={{ width: 20, height: 20, borderRadius: 5, border: `1.5px solid ${optin ? C.olive : C.line}`, background: optin ? C.olive : "transparent", display: "grid", placeItems: "center", flexShrink: 0, marginTop: 1 }}>
                    {optin && <Check size={13} color="#fff" />}
                  </span>
                  <input type="checkbox" checked={optin} onChange={(e) => setOptin(e.target.checked)} style={{ display: "none" }} />
                  <span style={{ fontSize: 12.5, color: C.inkSoft, lineHeight: 1.5 }}>
                    Aceito receber a confirmação e lembretes deste agendamento no WhatsApp. <span style={{ color: C.ink }}>Você pode cancelar quando quiser.</span>
                  </span>
                </label>
                <div style={{ fontSize: 10.5, color: C.inkSoft, fontStyle: "italic" }}>Não pedimos senha nem cadastro — só seu telefone para confirmar.</div>
              </div>
            </div>
          )}

          {/* STEP 5 — pagamento (Pix) */}
          {step === 5 && (
            <div className="ag-pulse">
              <H>Garanta seu horário</H>
              <div style={{ fontSize: 13, color: C.inkSoft, lineHeight: 1.5, marginTop: -6, marginBottom: 16 }}>
                Faça um Pix pra reservar — seu horário fica seguro e você não perde tempo no balcão.
              </div>

              <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, padding: 16, marginBottom: 14 }}>
                <SumRow k="Serviço" v={serviceNames} />
                <SumRow k="Quando" v={`${day?.label} ${day?.date} · ${time}`} />
                <SumRow k="Total" v={t.combo ? `${money(t.price)} (combo)` : money(t.price)} last />
              </div>

              <div style={{ background: C.oxDark, borderRadius: 14, padding: "20px 16px", textAlign: "center", marginBottom: 12 }}>
                <div style={{ background: "#fff", display: "inline-block", padding: 10, borderRadius: 12 }}>
                  <img src={qrURL(pixCode)} alt="QR Code Pix" width={196} height={196} style={{ display: "block" }} />
                </div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 7, color: C.brassL, fontSize: 12.5, marginTop: 12 }}>
                  <QrCode size={15} /> Escaneie no app do seu banco
                </div>
                <div style={{ fontFamily: MONO, fontSize: 20, color: "#F3E9D6", marginTop: 8, fontWeight: 700 }}>{money(payValue)}</div>
              </div>

              <button onClick={copyPix} className="ag-opt"
                style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, background: C.card, border: `1px solid ${copied ? C.olive : C.line}`, borderRadius: 10, padding: "13px", fontSize: 13.5, fontWeight: 600, color: copied ? C.olive : C.ink, cursor: "pointer", marginBottom: 18 }}>
                {copied ? <><Check size={15} /> Código Pix copiado!</> : <><Copy size={15} /> Copiar código Pix (copia e cola)</>}
              </button>

              <button onClick={() => { setPayMethod("pix"); setStep(6); }}
                style={{ ...btnPrimary, width: "100%", boxSizing: "border-box", justifyContent: "center", padding: "14px", fontSize: 15 }}>
                <Check size={16} /> Avisar que paguei
              </button>
              <div style={{ fontSize: 11.5, color: C.inkSoft, textAlign: "center", marginTop: 8, lineHeight: 1.5 }}>
                A barbearia confere o Pix e te confirma no WhatsApp. Você não precisa fazer mais nada.
              </div>
              <button onClick={() => { setPayMethod("local"); setStep(6); }}
                style={{ ...btnGhost, width: "100%", boxSizing: "border-box", justifyContent: "center", marginTop: 10 }}>
                <Wallet size={15} /> Prefiro pagar no balcão
              </button>
              <button onClick={() => setStep(4)}
                style={{ ...btnGhost, width: "100%", boxSizing: "border-box", justifyContent: "center", marginTop: 10, border: "none", color: C.inkSoft }}>
                <ArrowLeft size={14} /> Voltar
              </button>
            </div>
          )}

          {/* STEP 6 — confirmação / lista de espera */}
          {step === 6 && (
            <div className="ag-pulse" style={{ textAlign: "center", padding: "10px 0" }}>
              <div style={{ width: 60, height: 60, borderRadius: "50%", background: waitlist ? C.brass : C.olive, display: "grid", placeItems: "center", margin: "0 auto 16px" }}>
                {waitlist ? <CalendarClock size={28} color="#fff" /> : <Check size={30} color="#fff" strokeWidth={2.4} />}
              </div>
              <div style={{ fontFamily: SERIF, fontWeight: 900, fontSize: 26 }}>{waitlist ? "Você está na lista!" : "Agendado!"}</div>
              <div style={{ fontSize: 13.5, color: C.inkSoft, margin: "8px auto 20px", maxWidth: 320, lineHeight: 1.5 }}>
                {waitlist
                  ? `Te avisamos no WhatsApp assim que abrir um horário em ${day?.label} ${day?.date}.`
                  : payMethod === "pix"
                  ? "Recebemos seu agendamento! Assim que a barbearia confirmar seu Pix, está fechado."
                  : "Tudo certo, seu horário está reservado. O pagamento fica pra hora do atendimento."}
              </div>

              {!waitlist && (
                <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, padding: 18, textAlign: "left", marginBottom: 16 }}>
                  <SumRow k="Serviço" v={serviceNames} />
                  <SumRow k="Profissional" v={barber?.id === "any" ? "Sem preferência" : barber?.name} />
                  <SumRow k="Quando" v={`${day?.label} ${day?.date} · ${time}`} />
                  <SumRow k="Valor" v={t.combo ? `${money(t.price)} (combo)` : money(t.price)} />
                  <SumRow k="Pagamento" v={payMethod === "pix" ? `Pix de ${money(payValue)} (a confirmar)` : "Pagar no balcão"} last />
                </div>
              )}

              {/* prévia do WhatsApp */}
              {optin && (
                <div style={{ background: "#E7F0E2", border: `1px solid ${C.olive}`, borderRadius: 12, padding: "14px 16px", textAlign: "left", display: "flex", gap: 11 }}>
                  <MessageCircle size={20} color={C.olive} style={{ flexShrink: 0, marginTop: 2 }} />
                  <div>
                    <div style={{ fontSize: 10.5, color: C.olive, fontWeight: 600, letterSpacing: 1, textTransform: "uppercase", marginBottom: 4 }}>Mensagem no WhatsApp</div>
                    <div style={{ fontSize: 13, color: C.ink, lineHeight: 1.5 }}>
                      {waitlist
                        ? `Olá ${name.split(" ")[0] || "tudo bem"}! Você entrou na lista de espera da Barbearia Gerar para ${day?.label} ${day?.date}. Avisamos aqui se abrir vaga.`
                        : `Olá ${name.split(" ")[0] || "tudo bem"}! Seu horário na Barbearia Gerar está confirmado: ${serviceNames} com ${barber?.id === "any" ? "nossa equipe" : barber?.name} em ${day?.label} ${day?.date} às ${time}. ${payMethod === "pix" ? `Recebemos seu aviso de Pix de ${money(payValue)} e confirmamos já já. ` : ""}Até lá!`}
                    </div>
                  </div>
                </div>
              )}

              {!waitlist && (
                <a href={`https://wa.me/${PAGAMENTO.whatsapp}?text=${encodeURIComponent(`Oi! Preciso remarcar meu horário${payMethod === "pix" ? " (já paguei)" : ""}: ${serviceNames} em ${day?.label} ${day?.date} às ${time}. Consigo outro dia?`)}`}
                  target="_blank" rel="noreferrer"
                  style={{ ...btnGhost, justifyContent: "center", textDecoration: "none", width: "100%", boxSizing: "border-box", marginTop: 16, borderColor: C.brass, color: C.brassL }}>
                  <CalendarClock size={15} /> Preciso remarcar
                </a>
              )}
              {!waitlist && payMethod === "pix" && (
                <div style={{ fontSize: 11, color: C.inkSoft, textAlign: "center", marginTop: 7, lineHeight: 1.5 }}>
                  Imprevisto? Seu pagamento vira crédito pra nova data.
                </div>
              )}

              <button onClick={reset} style={{ ...btnGhost, margin: "16px auto 0" }}>Fazer outro agendamento</button>
            </div>
          )}
        </div>

        {/* Nav */}
        {step < 5 && (
          <div style={{ display: "flex", gap: 10, padding: "4px 24px 0" }}>
            {step > 1 && <button onClick={back} style={btnGhost}><ArrowLeft size={15} /> Voltar</button>}
            <button onClick={next} disabled={!canNext}
              style={{ ...btnPrimary, flex: 1, justifyContent: "center", opacity: canNext ? 1 : 0.4, cursor: canNext ? "pointer" : "not-allowed" }}>
              {step === 4 ? "Ir para o pagamento" : step === 3 && day && !dayHasSlots ? "Entrar na lista de espera" : "Continuar"}
              {step < 4 && <ArrowRight size={15} />}
            </button>
          </div>
        )}

        {/* Onde fica */}
        <div style={{ padding: "8px 20px 0" }}>
          <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 14, padding: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 10.5, letterSpacing: 2, textTransform: "uppercase", color: C.brassL, fontWeight: 600, marginBottom: 8 }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></svg>
              Onde fica
            </div>
            <div style={{ fontSize: 14, color: C.ink, lineHeight: 1.5, marginBottom: 14 }}>
              Rua José Corrêa, 471 — Tapera<br />Florianópolis · SC
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <a href="https://www.google.com/maps/search/?api=1&query=Barbearia%20Gerar%2C%20R.%20Jos%C3%A9%20Corr%C3%AAa%2C%20471%2C%20Tapera%2C%20Florian%C3%B3polis%20-%20SC"
                target="_blank" rel="noreferrer"
                style={{ ...btnPrimary, flex: 1, justifyContent: "center", textDecoration: "none", fontSize: 13, padding: "12px 8px" }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27Z" /></svg>
                Ver no Google
              </a>
              <a href="https://www.google.com/maps/dir/?api=1&destination=Barbearia%20Gerar%2C%20R.%20Jos%C3%A9%20Corr%C3%AAa%2C%20471%2C%20Tapera%2C%20Florian%C3%B3polis%20-%20SC"
                target="_blank" rel="noreferrer"
                style={{ ...btnGhost, flex: 1, justifyContent: "center", textDecoration: "none", fontSize: 13, padding: "12px 8px" }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2Z" /></svg>
                Como chegar
              </a>
            </div>
            <a href={`https://wa.me/${PAGAMENTO.whatsapp}`}
              target="_blank" rel="noreferrer"
              style={{ ...btnGhost, width: "100%", boxSizing: "border-box", justifyContent: "center", textDecoration: "none", fontSize: 13, padding: "11px", marginTop: 10, border: "none", color: C.inkSoft }}>
              <Phone size={14} /> Chamar no WhatsApp · (48) 98808-3166
            </a>
          </div>
        </div>

        <div style={{ textAlign: "center", padding: "26px 24px 10px" }}>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 8, fontSize: 12, color: C.inkSoft }}>
            <PhosphorosMark size={15} color={C.ox} /> Agendamento por <span style={{ fontFamily: SERIF, fontStyle: "italic", fontWeight: 600, color: C.ink }}>Phosphoros</span>
          </div>
        </div>
      </div>
    </div>
  );
}

const optStyle = (sel) => ({
  display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%",
  background: sel ? "rgba(44,114,216,.16)" : C.card, border: `1px solid ${sel ? C.ox : C.line}`,
  borderRadius: 12, padding: "14px 16px", cursor: "pointer", textAlign: "left", color: C.ink,
});
const inputStyle = { background: C.card, border: `1px solid ${C.line}`, borderRadius: 9, padding: "12px 13px", fontSize: 15, color: C.ink, outline: "none", width: "100%", boxSizing: "border-box" };
const btnPrimary = { display: "flex", alignItems: "center", gap: 7, background: C.ox, color: "#fff", border: "none", borderRadius: 9, padding: "13px 18px", fontSize: 14, fontWeight: 600, cursor: "pointer" };
const btnGhost = { display: "flex", alignItems: "center", gap: 6, background: "transparent", color: C.inkSoft, border: `1px solid ${C.line}`, borderRadius: 9, padding: "13px 16px", fontSize: 13.5, cursor: "pointer" };

function H({ children }) {
  return <h2 style={{ fontFamily: SERIF, fontWeight: 900, fontSize: 24, margin: "0 0 16px", color: C.ink }}>{children}</h2>;
}
function Field({ label, icon: Icon, children }) {
  return (
    <label style={{ display: "grid", gap: 6 }}>
      <span style={{ fontSize: 11, color: C.inkSoft, fontWeight: 600, letterSpacing: .8, textTransform: "uppercase", display: "flex", alignItems: "center", gap: 6 }}><Icon size={13} /> {label}</span>
      {children}
    </label>
  );
}
function SumRow({ k, v, last }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 20, padding: "11px 0", borderBottom: last ? "none" : `1px solid ${C.lineSoft}`, fontSize: 14 }}>
      <span style={{ color: C.inkSoft, flexShrink: 0 }}>{k}</span>
      <span style={{ color: C.ink, fontWeight: 500, fontFamily: k === "Valor" ? MONO : SANS, textAlign: "right", lineHeight: 1.55 }}>{v}</span>
    </div>
  );
}
const Muted = ({ children }) => <div style={{ fontSize: 13, color: C.inkSoft, fontStyle: "italic", padding: "10px 0" }}>{children}</div>;

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Agendamento));
</script>
</body>
</html>
