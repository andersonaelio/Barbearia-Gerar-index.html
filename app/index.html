function BarbeariaOS() {
  const [screen, setScreen] = useState("hoje");
  const [role, setRole] = useState("dono"); // "dono" vê tudo · "barbeiro" não vê Painel nem Financeiro
  const setRoleSafe = (r) => { setRole(r); if (r === "barbeiro" && (screen === "painel" || screen === "financeiro")) setScreen("hoje"); };
  const [products, setProducts] = useState(initialProducts);
  const [appointments, setAppointments] = useState(initialAppointments);
  const [returns, setReturns] = useState(initialReturns);

  const [active, setActive] = useState(null);
  const [cart, setCart] = useState([]);
  const [refused, setRefused] = useState([]);

  const [sales, setSales] = useState([]);
  const [expenses] = useState([{ id: "e1", label: "Produtos de limpeza", value: 60 }]);
  const [pulse, setPulse] = useState([]);
  const [movements, setMovements] = useState([]);

  // registra um movimento de estoque e ajusta o saldo (inventory_movements)
  const applyMovement = (productId, type, qty, note) => {
    setProducts((prev) =>
      prev.map((p) => {
        if (p.id !== productId) return p;
        let newStock = p.stock;
        if (type === "ajuste") newStock = qty;        // contagem: valor absoluto
        else if (type === "entrada") newStock = p.stock + qty; // reposição
        else newStock = p.stock - qty;                 // perda / venda
        return { ...p, stock: newStock };
      })
    );
    setMovements((m) => [{ id: "mv" + Date.now() + Math.round(Math.random() * 999), productId, type, qty, note, seq: m.length + 1 }, ...m]);
  };

  const barberOf = (id) => initialBarbers.find((b) => b.id === id) || { id: null, name: "Sem preferência", commission: 0 };
  const assignBarber = (id, barberId) => setAppointments((a) => a.map((x) => (x.id === id ? { ...x, barberId } : x)));
  const unassignedCount = appointments.filter((a) => !a.barberId && a.status !== "done").length;
  const serviceOf = (id) => initialServices.find((s) => s.id === id);

  const startService = (appt) => {
    const svc = serviceOf(appt.serviceId);
    setActive(appt);
    setCart([{ type: "service", id: svc.id, name: svc.name, price: svc.price }]);
    setRefused([]);
    setScreen("checkout");
  };

  const suggestions = useMemo(() => {
    const inCart = new Set(cart.filter((i) => i.type === "product").map((i) => i.id));
    return products
      .filter((p) => !inCart.has(p.id) && !refused.includes(p.id) && p.stock > 0)
      .slice(0, 3);
  }, [products, cart, refused]);

  const addProduct = (p) =>
    setCart((c) => [...c, { type: "product", id: p.id, name: p.name, price: p.price, cost: p.cost }]);
  const addService = (s) =>
    setCart((c) => [...c, { type: "service", id: s.id, name: s.name, price: s.price }]);
  const removeFromCart = (idx) => setCart((c) => c.filter((_, i) => i !== idx));
  const refuse = (p) => setRefused((r) => [...r, p.id]);

  const cartTotal = cart.reduce((a, i) => a + i.price, 0);
  const productCount = cart.filter((i) => i.type === "product").length;

  const finalizeSale = () => {
    const barber = barberOf(active.barberId);
    const serviceRevenue = cart.filter((i) => i.type === "service").reduce((a, i) => a + i.price, 0);
    const commission = serviceRevenue * barber.commission;

    const sale = {
      id: "v" + (sales.length + 1),
      client: active.client, barber: barber.name, barberId: barber.id,
      items: cart, total: cartTotal, serviceRevenue, commission, time: active.time,
    };

    const soldProductIds = cart.filter((i) => i.type === "product").map((i) => i.id);
    soldProductIds.forEach((id) => applyMovement(id, "venda", 1));

    setSales((s) => [...s, sale]);
    setAppointments((a) => a.map((x) => (x.id === active.id ? { ...x, status: "done" } : x)));
    setReturns((r) => [
      ...r,
      { id: "ret-" + active.id, client: active.client, phone: active.phone, lastVisitDays: 0, suggestedEvery: 30, preferred: serviceOf(active.serviceId).name, justScheduled: true },
    ]);

    const negativeStock = soldProductIds
      .map((id) => products.find((p) => p.id === id))
      .filter((p) => p && p.stock - 1 < 0);

    const chips = [];
    chips.push(`Venda ${money(cartTotal)} registrada na comanda`);
    if (soldProductIds.length) chips.push(`${soldProductIds.length} produto(s) baixado(s) no estoque`);
    if (negativeStock.length) chips.push(`⚠ ${negativeStock[0].name} ficou negativo — confira o estoque`);
    chips.push(`+${money(cartTotal)} no caixa · comissão de ${money(commission)} lançada`);
    chips.push(`Retorno de ${active.client} agendado para +30 dias`);
    setPulse(chips);

    setActive({ ...active, finished: true, sale });
    setCart([]);
  };

  const fin = useMemo(() => {
    const entradas = sales.reduce((a, s) => a + s.total, 0);
    const comissoes = sales.reduce((a, s) => a + s.commission, 0);
    const saidasDesp = expenses.reduce((a, e) => a + e.value, 0);
    const saidas = comissoes + saidasDesp;
    const porServico = {}, porProduto = {};
    sales.forEach((s) =>
      s.items.forEach((i) => {
        if (i.type === "service") porServico[i.name] = (porServico[i.name] || 0) + i.price;
        else porProduto[i.name] = (porProduto[i.name] || 0) + i.price;
      })
    );
    return { entradas, comissoes, saidasDesp, saidas, saldo: entradas - saidas, porServico, porProduto };
  }, [sales, expenses]);

  const criticalCount = products.filter((p) => p.stock <= p.min).length;

  return (
    <div style={{ background: "radial-gradient(1100px 720px at 50% -4%, #1E1E27 0%, #131318 52%, #0B0B0E 100%)", backgroundAttachment: "fixed", minHeight: "100vh", color: C.ink, fontFamily: SANS }}>
      <style>{FONT}</style>
      <style>{`
        .bb-pulse { animation: bbpulse .5s cubic-bezier(.2,.7,.3,1) both; }
        @keyframes bbpulse { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none} }
        .bb-card { transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
        .bb-card:hover { transform: translateY(-2px); box-shadow: 0 10px 24px -16px rgba(60,40,20,.5); border-color:${C.brass}; }
        .bb-tab:hover { color:${C.ink} !important; }
        ::-webkit-scrollbar{height:8px;width:8px}
        ::-webkit-scrollbar-thumb{background:${C.line};border-radius:8px}

      <div style={{ background: "#101014", color: "#F3F1EC", borderBottom: `1px solid ${C.line}` }}>
        <div className="rwrap rtopbar" style={{ borderBottom: `1px solid rgba(255,255,255,.12)`, maxWidth: 1040, margin: "0 auto", padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>

              <div style={{ fontFamily: SERIF, fontWeight: 900, fontSize: 23, letterSpacing: 0.3, lineHeight: 1 }}>

            <div style={{ display: "flex", background: "rgba(255,255,255,.06)", border: `1px solid ${C.line}`, borderRadius: 8, padding: 3, gap: 2 }}>
              {[["dono", "Dono"], ["barbeiro", "Barbeiro"]].map(([r, label]) => (
                <button key={r} onClick={() => setRoleSafe(r)}

                  {label}
                </button>
              ))}
            </div>
            <button onClick={() => setScreen("hoje")} style={{ display: "flex", alignItems: "center", gap: 6, background: screen === "hoje" ? "rgba(44,114,216,.22)" : "transparent", color: "#F3E9D6", border: `1px solid ${C.brassL}`, borderRadius: 7, padding: "7px 13px", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>
              <Sun size={14} /> Hoje

                <BarChart3 size={14} /> Painel
              </button>
            )}
            <div style={{ width: 30, height: 30, borderRadius: "50%", border: `1px solid ${C.brassL}`, display: "grid", placeItems: "center", color: C.brassL }}><User size={15} /></div>
          </div>
        </div>
      </div>

      <FlowRail screen={screen} setScreen={setScreen} criticalCount={criticalCount} returns={returns} role={role} unassignedCount={unassignedCount} />

      {role === "barbeiro" && (
        <div style={{ maxWidth: 1040, margin: "0 auto", padding: "12px 24px 0" }}>
          <div style={{ background: "rgba(44,114,216,.10)", border: `1px solid ${C.brass}`, borderRadius: 12, boxShadow: "0 16px 34px -16px rgba(0,0,0,.85)", padding: "11px 15px", fontSize: 12.5, color: C.inkSoft, display: "flex", alignItems: "center", gap: 9 }}>
            <User size={15} color={C.brassL} style={{ flexShrink: 0 }} />

          </div>
        </div>
      )}

      <div className="rwrap" style={{ maxWidth: 1040, margin: "0 auto", padding: "30px 24px 90px" }}>
        {screen === "hoje" && <Hoje appointments={appointments} barberOf={barberOf} serviceOf={serviceOf} startService={startService} sales={sales} products={products} returns={returns} goTo={setScreen} />}
        {screen === "painel" && role === "dono" && <Painel />}
        {screen === "agenda" && <Agenda appointments={appointments} barberOf={barberOf} serviceOf={serviceOf} startService={startService} barbers={initialBarbers} assignBarber={assignBarber} />}
        {screen === "checkout" && (
          <Checkout active={active} cart={cart} suggestions={suggestions} refused={refused}
            services={initialServices} addProduct={addProduct} addService={addService}
            removeFromCart={removeFromCart} refuse={refuse} cartTotal={cartTotal}
            productCount={productCount} finalizeSale={finalizeSale} pulse={pulse}
            goNext={() => setScreen("estoque")} barberOf={barberOf}
            backToAgenda={() => { setActive(null); setPulse([]); setScreen("agenda"); }} />
        )}
        {screen === "estoque" && <Estoque products={products} goManage={() => setScreen("produtos")} />}
        {screen === "produtos" && <Produtos products={products} setProducts={setProducts} movements={movements} applyMovement={applyMovement} back={() => setScreen("estoque")} />}
        {screen === "financeiro" && role === "dono" && <Financeiro fin={fin} sales={sales} expenses={expenses} />}
        {screen === "whatsapp" && <Whatsapp returns={returns} setReturns={setReturns} />}
      </div>

      <div style={{ maxWidth: 1040, margin: "0 auto", padding: "0 24px" }}>
        <div style={{ borderTop: `1px solid ${C.lineSoft}`, padding: "16px 0 36px", textAlign: "center" }}>

            <PhosphorosMark size={16} color={C.ox} /> feito com <span style={{ fontFamily: SERIF, fontStyle: "italic", fontWeight: 600, color: C.ink }}>Phosphoros</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────
function FlowRail({ screen, setScreen, criticalCount, returns, role, unassignedCount }) {
  const steps = STEPS.filter((s) => role === "dono" || s.key !== "financeiro");
  return (
    <div style={{ background: C.card, borderBottom: `1px solid ${C.line}` }}>
      <div className="rwrap" style={{ maxWidth: 1040, margin: "0 auto", padding: "0 24px", display: "flex", alignItems: "stretch", overflowX: "auto" }}>
        {steps.map((s, i) => {
          const Icon = s.icon;
          const activeS = screen === s.key;
          const badge = s.key === "agenda" && unassignedCount ? unassignedCount : s.key === "estoque" && criticalCount ? criticalCount : s.key === "whatsapp" ? returns.length : null;
          const badgeColor = s.key === "agenda" ? GERAR_RED : s.key === "estoque" ? C.brick : C.olive;
          return (
            <React.Fragment key={s.key}>
              <button className="bb-tab" onClick={() => setScreen(s.key)}
                style={{ display: "flex", alignItems: "center", gap: 9, padding: "15px 18px", border: "none", background: "transparent", cursor: "pointer", whiteSpace: "nowrap",
                  color: activeS ? C.ox : C.inkSoft, borderBottom: `2.5px solid ${activeS ? C.ox : "transparent"}`, fontSize: 13, fontWeight: activeS ? 600 : 500 }}>
                <span style={{ fontFamily: MONO, fontSize: 11, color: activeS ? C.brass : C.line }}>0{i + 1}</span>
                <Icon size={15} />
                {s.label}
                {badge ? <span style={{ background: badgeColor, color: "#fff", borderRadius: 20, fontSize: 10, padding: "1px 6px", fontFamily: MONO, minWidth: 16, textAlign: "center" }}>{badge}</span> : null}
              </button>
              {i < steps.length - 1 && <div style={{ display: "flex", alignItems: "center", color: C.line }}><ChevronRight size={13} /></div>}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

function SectionTitle({ kicker, title, right, kickerColor = C.brass, barColor = C.ox }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 24, gap: 16, flexWrap: "wrap" }}>
      <div>
        <div style={{ color: kickerColor, fontSize: 10.5, letterSpacing: 3.5, textTransform: "uppercase", fontWeight: 600 }}>{kicker}</div>
        <h2 className="rtitle" style={{ fontFamily: SERIF, fontWeight: 900, fontSize: 36, margin: "6px 0 0", color: C.ink, lineHeight: 1 }}>{title}</h2>
        <div style={{ width: 46, height: 3, background: barColor, marginTop: 12 }} />
      </div>
      {right}
    </div>
  );
}

function Agenda({ appointments, barberOf, serviceOf, startService, barbers, assignBarber }) {
  const fila = appointments.filter((a) => !a.barberId && a.status !== "done");
  const assigned = appointments.filter((a) => a.barberId);
  return (
    <div className="bb-pulse">
      <SectionTitle kicker="Hoje · Ter, 02 Jun" title="Agenda do dia"
        right={<div style={{ fontSize: 12.5, color: C.inkSoft, fontStyle: "italic", fontFamily: SERIF }}>Toque em um cliente para iniciar o atendimento →</div>} />

      {/* Fila de disponíveis — sem barbeiro */}
      <div style={{ marginBottom: 18, border: `1px solid ${fila.length ? GERAR_RED : C.line}`, background: fila.length ? "rgba(229,53,43,.07)" : C.card, borderRadius: 12, boxShadow: "0 16px 34px -16px rgba(0,0,0,.85)", padding: "15px 18px", transition: "all .2s" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ width: 26, height: 26, borderRadius: "50%", display: "grid", placeItems: "center", background: fila.length ? GERAR_RED : C.line, flexShrink: 0 }}>
              <User size={15} color="#fff" />
            </span>
            <span style={{ fontSize: 14, fontWeight: 700, color: fila.length ? GERAR_RED : C.inkSoft }}>
              {fila.length ? `${fila.length} cliente${fila.length > 1 ? "s" : ""} esperando barbeiro` : "Ninguém esperando — tudo distribuído"}
            </span>
          </div>
          {fila.length > 0 && <span style={{ fontSize: 10.5, color: GERAR_RED, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", border: `1px solid ${GERAR_RED}`, borderRadius: 20, padding: "3px 9px" }}>Sem barbeiro</span>}
        </div>

        {fila.map((a) => {
          const s = serviceOf(a.serviceId);
          return (
            <div key={a.id} className="bb-pulse" style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, boxShadow: "0 16px 34px -16px rgba(0,0,0,.85)", padding: "13px 15px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, flexWrap: "wrap", marginTop: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <div style={{ fontFamily: MONO, fontWeight: 600, fontSize: 19, color: C.ink }}>{a.time}</div>
                <div style={{ width: 1, height: 32, background: C.line }} />
                <div>
                  <div style={{ fontSize: 15.5, color: C.ink, fontWeight: 600, fontFamily: SERIF }}>{a.client}</div>
                  <div style={{ fontSize: 12, color: C.inkSoft, marginTop: 2 }}>{s.name} · {money(s.price)} · sem preferência</div>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 7, flexWrap: "wrap" }}>
                <span style={{ fontSize: 11.5, color: C.inkSoft, marginRight: 2 }}>Eu atendo:</span>
                {barbers.map((b) => (
                  <button key={b.id} onClick={() => assignBarber(a.id, b.id)} title={b.name} className="bb-chip"
                    style={{ width: 32, height: 32, borderRadius: "50%", border: `1px solid ${C.line}`, background: C.paper, color: C.ink, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: SANS }}>
                    {b.name[0]}
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* Agenda já atribuída */}
      <div style={{ display: "grid", gap: 12 }}>
        {assigned.map((a) => {
          const b = barberOf(a.barberId), s = serviceOf(a.serviceId);
          const done = a.status === "done", late = a.lastVisitDays > 30;
          return (
            <div key={a.id} className="bb-card" onClick={() => !done && startService(a)}
              style={{ background: C.card, border: `1px solid ${C.line}`, borderLeft: `3px solid ${done ? C.line : "#3C4250"}`, borderRadius: 12, boxShadow: "0 16px 34px -16px rgba(0,0,0,.85)", padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", opacity: done ? 0.55 : 1, cursor: done ? "default" : "pointer" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 18 }}>
                <div style={{ textAlign: "center", minWidth: 58 }}>
                  <div style={{ fontFamily: MONO, fontWeight: 600, fontSize: 22, color: C.ox, lineHeight: 1 }}>{a.time}</div>
                  <div style={{ fontSize: 9.5, color: C.inkSoft, display: "flex", alignItems: "center", gap: 3, justifyContent: "center", marginTop: 4, letterSpacing: 1 }}><Clock size={10} />HOJE</div>
                </div>
                <div style={{ width: 1, height: 40, background: C.line }} />
                <div>
                  <div style={{ fontSize: 16.5, color: C.ink, fontWeight: 600, fontFamily: SERIF }}>{a.client}</div>
                  <div style={{ fontSize: 12.5, color: C.inkSoft, marginTop: 3 }}>{s.name} · {money(s.price)} · com {b.name}</div>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                {late && !done && <span style={{ fontSize: 10.5, color: C.ox, border: `1px solid ${C.ox}`, borderRadius: 20, padding: "3px 10px", fontWeight: 500 }}>{a.lastVisitDays}d sem voltar</span>}
                {done ? <span style={{ color: C.olive, fontSize: 12.5, display: "flex", alignItems: "center", gap: 5, fontWeight: 600 }}><Check size={15} />Finalizado</span>
                  : <span style={{ color: C.ox, fontSize: 13, display: "flex", alignItems: "center", gap: 6, fontWeight: 600 }}>Atender <ArrowRight size={15} /></span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Checkout({ active, cart, suggestions, refused, services, addProduct, addService, removeFromCart, refuse, cartTotal, productCount, finalizeSale, pulse, goNext, barberOf, backToAgenda }) {
  if (!active) return <Empty msg="Nenhum atendimento selecionado. Volte para a Agenda." />;
  const finished = active.finished;
  const b = barberOf(active.barberId);

  if (finished) {
    return (
      <div className="bb-pulse">
        <SectionTitle kicker="Venda concluída" title="Tudo conectado" />
        <div style={{ background: C.card, border: `1px solid ${C.line}`, borderTop: `3px solid ${C.olive}`, borderRadius: 12, boxShadow: "0 16px 34px -16px rgba(0,0,0,.85)", padding: 24, marginBottom: 22 }}>
          <div style={{ fontSize: 13.5, color: C.inkSoft, marginBottom: 16, fontFamily: SERIF, fontStyle: "italic" }}>
            Veja o que uma única finalização disparou pelo sistema:
          </div>
          <div style={{ display: "grid", gap: 10 }}>
            {pulse.map((p, i) => {
              const warn = p.startsWith("⚠");
              return (
                <div key={i} className="bb-pulse" style={{ animationDelay: `${i * 0.12}s`, display: "flex", alignItems: "center", gap: 12, background: warn ? "rgba(230,170,80,.13)" : C.paper, borderRadius: 8, padding: "13px 15px", border: `1px solid ${warn ? C.brick : C.lineSoft}` }}>
                  <div style={{ width: 22, height: 22, borderRadius: "50%", background: warn ? C.brick : C.olive, display: "grid", placeItems: "center", flexShrink: 0 }}>
                    {warn ? <AlertTriangle size={12} color="#fff" /> : <Check size={13} color="#fff" />}
                  </div>
                  <span style={{ fontSize: 13.5, color: C.ink }}>{p.replace("⚠ ", "")}</span>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
          <button onClick={goNext} style={btnPrimary}>Ver impacto no estoque <ArrowRight size={16} /></button>
          <button onClick={backToAgenda} style={btnGhost}><RotateCcw size={15} /> Voltar à agenda</button>
        </div>
      </div>
    );
  }

  return (
    <div className="bb-pulse">
      <SectionTitle kicker={`Atendimento · ${active.client} · com ${b.name}`} title="Checkout" />
      <div className="rg" style={{ display: "grid", gridTemplateColumns: "1.35fr 1fr", gap: 20 }}>
        <div>
          <div style={{ background: C.card, border: `1px solid ${C.brass}`, borderRadius: 12, boxShadow: "0 16px 34px -16px rgba(0,0,0,.85)", padding: 20, marginBottom: 18, position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: `linear-gradient(90deg, ${C.brass}, ${C.brassL})` }} />
            <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 4 }}>
              <Sparkles size={18} color={C.brass} />
              <span style={{ fontFamily: SERIF, fontWeight: 600, fontSize: 19, color: C.ink }}>Que tal oferecer?</span>
            </div>
            <div style={{ fontSize: 12.5, color: C.inkSoft, marginBottom: 16 }}>Sugestões para aumentar o ticket. Um toque adiciona à venda.</div>
            <div style={{ display: "grid", gap: 10 }}>
              {suggestions.length === 0 && <div style={{ fontSize: 12.5, color: C.inkSoft }}>Sem mais sugestões.</div>}
              {suggestions.map((p) => (
                <div key={p.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: C.paper, borderRadius: 8, padding: "12px 14px", border: `1px solid ${C.lineSoft}` }}>
                  <div>
                    <div style={{ fontSize: 14.5, color: C.ink, fontWeight: 500 }}>{p.name}</div>
                    <div style={{ fontSize: 11.5, color: C.inkSoft, fontFamily: MONO, marginTop: 2 }}>{money(p.price)} · margem {money(p.price - p.cost)}</div>
                  </div>
                  <div style={{ display: "flex", gap: 7, flexShrink: 0 }}>
                    <button onClick={() => addProduct(p)} style={{ ...chipBtn, borderColor: C.olive, color: C.olive, background: "rgba(75,199,142,.12)", fontWeight: 600 }}><Check size={14} /> Cliente quis</button>
                    <button onClick={() => refuse(p)} style={{ ...chipBtn, borderColor: GERAR_RED, color: GERAR_RED, background: "rgba(229,53,43,.10)", fontWeight: 600 }}><X size={14} /> Não quis</button>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ fontSize: 10.5, letterSpacing: 2.5, textTransform: "uppercase", color: C.brass, marginBottom: 9, fontWeight: 600 }}>Adicionar serviço</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {services.map((s) => (
              <button key={s.id} onClick={() => addService(s)} style={{ ...chipBtn, borderColor: C.line, color: C.ink, background: C.card }}>
                <Plus size={13} /> {s.name} · {money(s.price)}
              </button>
            ))}
          </div>
          {refused.length > 0 && <div style={{ marginTop: 16, fontSize: 11.5, color: C.inkSoft, fontStyle: "italic" }}>Recusados (registrado para análise): {refused.length} produto(s)</div>}
        </div>

        <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, boxShadow: "0 16px 34px -16px rgba(0,0,0,.85)", padding: 20, alignSelf: "start", position: "sticky", top: 20 }}>
          <div style={{ fontFamily: SERIF, fontWeight: 900, fontSize: 19, color: C.ink, marginBottom: 4, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            Comanda <Scissors size={15} color={C.brass} />
          </div>
          <div style={{ borderTop: `1px solid ${C.line}`, margin: "10px 0 12px" }} />
          <div style={{ display: "grid", gap: 9, marginBottom: 14 }}>
            {cart.map((i, idx) => (
              <div key={idx} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13.5 }}>
                <span style={{ color: C.ink, display: "flex", alignItems: "center", gap: 7 }}>
                  <span style={{ fontSize: 8.5, padding: "2px 5px", borderRadius: 4, fontFamily: MONO, fontWeight: 500, background: i.type === "product" ? "rgba(44,114,216,.16)" : C.paper, color: i.type === "product" ? C.brass : C.inkSoft }}>{i.type === "product" ? "PROD" : "SERV"}</span>
                  {i.name}
                </span>
                <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ color: C.ink, fontFamily: MONO }}>{money(i.price)}</span>
                  <button onClick={() => removeFromCart(idx)} style={{ background: "none", border: "none", cursor: "pointer", color: C.inkSoft, display: "grid", placeItems: "center", padding: 0 }}><X size={13} /></button>
                </span>
              </div>
            ))}
          </div>
          <div style={{ borderTop: `1px dashed ${C.line}`, paddingTop: 12 }}>
            <Row k="Itens" v={`${cart.length} (${productCount} produto)`} muted />
            <Row k="Comissão est." v={money(cart.filter(i => i.type === 'service').reduce((a, i) => a + i.price, 0) * b.commission)} muted />
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", margin: "10px 0 16px" }}>
            <span style={{ fontSize: 12.5, color: C.inkSoft, letterSpacing: 1, textTransform: "uppercase" }}>Total</span>
            <span style={{ fontFamily: MONO, fontWeight: 600, fontSize: 30, color: C.ox }}>{money(cartTotal)}</span>
          </div>
          <button onClick={finalizeSale} style={{ ...btnPrimary, width: "100%", justifyContent: "center" }}><Check size={17} /> Finalizar venda</button>
          <div style={{ fontSize: 10.5, color: C.inkSoft, textAlign: "center", marginTop: 11, fontStyle: "italic" }}>baixa estoque · lança no caixa · agenda retorno</div>
        </div>
      </div>
    </div>
  );
}

function Estoque({ products, goManage }) {
  const openWhats = (p) => {
    const msg = encodeURIComponent(`Olá ${p.supplier}, preciso repor ${p.name}. Podem me passar disponibilidade e prazo?`);
    window.open(`https://wa.me/${p.supplierPhone}?text=${msg}`, "_blank");
  };
  return (
    <div className="bb-pulse">
      <SectionTitle kicker="Atualizado em tempo real" title="Estoque inteligente" kickerColor={C.inkSoft} barColor="#44444F"
        right={<button onClick={goManage} style={btnGhost}><Pencil size={14} /> Gerenciar produtos</button>} />
      <div style={{ display: "grid", gap: 14 }}>
        {products.map((p) => {
          const lvl = p.stock <= p.min ? "low" : p.stock <= p.min * 2 ? "mid" : "full";
          const critical = lvl === "low", neg = p.stock < 0;
          const tag = lvl === "low" ? { cor: "#E5352B", txt: neg ? "negativo" : "acabando", bg: "rgba(229,53,43,.12)" }
                    : lvl === "mid" ? { cor: "#E8B53A", txt: "pela metade", bg: "rgba(232,181,58,.12)" }
                    : null;

function Ring({ pct, size = 72 }) {
  const r = (size - 9) / 2, circ = 2 * Math.PI * r, off = circ * (1 - Math.min(1, pct / 100));

  return (
    <svg width={size} height={size}>
      <g style={{ transform: `rotate(-90deg)`, transformOrigin: "center" }}>
        <circle cx={cx} cy={cx} r={r} fill="none" stroke="rgba(255,255,255,.15)" strokeWidth="6" />
        <circle cx={cx} cy={cx} r={r} fill="none" stroke="#BE8A2C" strokeWidth="6" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={off} style={{ transition: "stroke-dashoffset .6s" }} />
      </g>
      <text x={cx} y={cx} fill="#F3F1EC" fontFamily="'Courier Prime', monospace" fontSize="15" fontWeight="600" textAnchor="middle" dominantBaseline="central">{pct}%</text>
    </svg>
  );
}

function QR({ text, px = 132 }) {
  const N = 25, cell = px / N;
  let h = 2166136261;
  for (let i = 0; i < text.length; i++) { h ^= text.charCodeAt(i); h = Math.imul(h, 16777619); }
  const rnd = () => { h ^= h << 13; h ^= h >>> 17; h ^= h << 5; return ((h >>> 0) % 1000) / 1000; };
  const inFinder = (x, y) => {
    const f = (ox, oy) => x >= ox && x < ox + 7 && y >= oy && y < oy + 7;
    return f(0, 0) || f(N - 7, 0) || f(0, N - 7);
  };
  const rects = [];
  for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
    if (inFinder(x, y)) continue;
    if (rnd() > 0.52) rects.push(<rect key={x + "-" + y} x={x * cell} y={y * cell} width={cell} height={cell} fill={C.ink} />);
  }
  const finder = (ox, oy) => (
    <g key={ox + "f" + oy}>
      <rect x={ox * cell} y={oy * cell} width={7 * cell} height={7 * cell} fill={C.ink} />
      <rect x={(ox + 1) * cell} y={(oy + 1) * cell} width={5 * cell} height={5 * cell} fill={C.card} />
      <rect x={(ox + 2) * cell} y={(oy + 2) * cell} width={3 * cell} height={3 * cell} fill={C.ink} />
    </g>
  );
  return (
    <svg id="qr-svg" width={px} height={px} viewBox={`0 0 ${px} ${px}`} style={{ background: C.card, borderRadius: 8, border: `1px solid ${C.line}`, padding: 6 }}>
      {rects}
      {finder(0, 0)}{finder(N - 7, 0)}{finder(0, N - 7)}
    </svg>
  );
}

function BarRow({ label, value, max, caption, color }) {
  const pct = Math.max(3, Math.round((value / max) * 100));
  return (
    <div style={{ marginBottom: 13 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 }}>
        <span style={{ color: C.ink }}>{label}</span>
        <span style={{ fontFamily: MONO, color: C.ink, fontWeight: 600 }}>{caption}</span>
      </div>
      <div style={{ height: 8, background: C.paper2, borderRadius: 6, overflow: "hidden" }}>
        <div style={{ width: pct + "%", height: "100%", background: color || C.brass, transition: "width .5s" }} />
      </div>
    </div>
  );
}

const btnPrimary = { display: "flex", alignItems: "center", gap: 8, background: C.ox, color: "#fff", border: "none", borderRadius: 8, padding: "11px 18px", fontSize: 13.5, fontWeight: 600, cursor: "pointer" };
const btnGhost = { display: "flex", alignItems: "center", gap: 7, background: "transparent", color: C.inkSoft, border: `1px solid ${C.line}`, borderRadius: 8, padding: "11px 16px", fontSize: 13, cursor: "pointer" };
const chipBtn = { display: "flex", alignItems: "center", gap: 5, background: "transparent", border: "1px solid", borderRadius: 7, padding: "7px 11px", fontSize: 12.5, cursor: "pointer", fontWeight: 500 };
const inputStyle = { background: C.paper, border: `1px solid ${C.line}`, borderRadius: 6, padding: "9px 11px", fontSize: 14, color: C.ink, fontFamily: SANS, outline: "none", width: "100%", boxSizing: "border-box" };

const MV = {
  entrada: { label: "Entrada / reposição", sign: "+", color: C.olive, badge: "ENTRADA" },
  perda: { label: "Perda / quebra", sign: "−", color: C.brick, badge: "PERDA" },
  ajuste: { label: "Contagem / ajuste", sign: "=", color: C.brass, badge: "AJUSTE" },
  venda: { label: "Venda", sign: "−", color: C.ox, badge: "VENDA" },
};

function Produtos({ products, setProducts, movements, applyMovement, back }) {
  const [editId, setEditId] = useState(null);
  const [draft, setDraft] = useState(null);
  const [qty, setQty] = useState({});
  const [reason, setReason] = useState({});

  const startEdit = (p) => { setEditId(p.id); setDraft({ ...p }); };
  const startNew = () => { setEditId("new"); setDraft({ id: "p" + Date.now(), name: "", price: 0, cost: 0, stock: 0, min: 0, supplier: "", supplierPhone: "" }); };
  const cancel = () => { setEditId(null); setDraft(null); };
  const save = () => {
    setProducts((prev) => {
      const exists = prev.some((p) => p.id === draft.id);
      const clean = { ...draft, price: +draft.price || 0, cost: +draft.cost || 0, stock: parseInt(draft.stock) || 0, min: parseInt(draft.min) || 0 };
      return exists ? prev.map((p) => (p.id === draft.id ? clean : p)) : [...prev, clean];
    });
    cancel();
  };
  const registrar = (p) => {
    const n = parseInt(qty[p.id]);
    if (isNaN(n)) return;
    applyMovement(p.id, reason[p.id] || "entrada", n);
    setQty((q) => ({ ...q, [p.id]: "" }));
  };

  const field = (label, key, opts = {}) => (
    <label style={{ display: "grid", gap: 5, fontSize: 10, color: C.inkSoft, fontWeight: 600, letterSpacing: 0.8, textTransform: "uppercase" }}>
      {label}
      <input value={draft[key]} type={opts.type || "text"} placeholder={opts.ph || ""}
        onChange={(e) => setDraft((d) => ({ ...d, [key]: e.target.value }))} style={inputStyle} />
    </label>
  );

  const nameOf = (id) => (products.find((p) => p.id === id) || {}).name || "—";

  return (
    <div className="bb-pulse">
      <SectionTitle kicker="Cadastro · onde a automação começa" title="Gerenciar produtos"
        right={<button onClick={back} style={btnGhost}><ArrowLeft size={14} /> Voltar ao estoque</button>} />

      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 16 }}>
        <button onClick={startNew} style={btnPrimary}><Plus size={16} /> Novo produto</button>
      </div>

      {editId === "new" && draft && <EditForm draft={draft} field={field} save={save} cancel={cancel} title="Novo produto" />}

      <div style={{ display: "grid", gap: 12 }}>
        {products.map((p) =>
          editId === p.id && draft ? (
            <EditForm key={p.id} draft={draft} field={field} save={save} cancel={cancel} title={`Editando: ${p.name}`} />
          ) : (
            <div key={p.id} style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, boxShadow: "0 16px 34px -16px rgba(0,0,0,.85)", padding: "16px 20px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 18, flexWrap: "wrap" }}>
                <div style={{ minWidth: 160 }}>
                  <div style={{ fontFamily: SERIF, fontWeight: 600, fontSize: 16, color: C.ink }}>{p.name}</div>
                  <div style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 3 }}>{p.supplier} · mín {p.min} un</div>
                </div>
                <div style={{ display: "flex", gap: 24 }}>
                  <Stat label="preço" v={money(p.price)} />
                  <Stat label="custo" v={money(p.cost)} />
                  <Stat label="estoque" v={p.stock} strong color={p.stock <= p.min ? C.brick : C.ink} />
                </div>
                <button onClick={() => startEdit(p)} style={{ ...chipBtn, borderColor: C.line, color: C.ink, background: C.card }}><Pencil size={13} /> Editar</button>
              </div>

              {/* registrar movimento de estoque */}
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 14, paddingTop: 14, borderTop: `1px dashed ${C.line}`, flexWrap: "wrap" }}>
                <span style={{ fontSize: 10.5, color: C.inkSoft, letterSpacing: 1, textTransform: "uppercase", fontWeight: 600 }}>Registrar movimento:</span>
                <select value={reason[p.id] || "entrada"} onChange={(e) => setReason((r) => ({ ...r, [p.id]: e.target.value }))}
                  style={{ ...inputStyle, width: "auto", padding: "8px 10px", cursor: "pointer" }}>
                  <option value="entrada">Entrada / reposição</option>
                  <option value="perda">Perda / quebra</option>
                  <option value="ajuste">Contagem / ajuste</option>
                </select>
                <input value={qty[p.id] || ""} onChange={(e) => setQty((q) => ({ ...q, [p.id]: e.target.value }))}
                  placeholder={(reason[p.id] || "entrada") === "ajuste" ? "novo total" : "qtd"} inputMode="numeric" style={{ ...inputStyle, width: 92 }} />
                <button onClick={() => registrar(p)} style={{ ...chipBtn, borderColor: C.ox, color: C.ox, background: C.card }}>Registrar</button>
              </div>
            </div>
          )
        )}
      </div>

      {/* histórico auditável — inventory_movements */}
      <div style={{ marginTop: 26 }}>
        <div style={{ fontSize: 10.5, letterSpacing: 2.5, textTransform: "uppercase", color: C.brass, fontWeight: 600, marginBottom: 12 }}>Histórico de movimentos</div>
        {movements.length === 0 ? (
          <Muted>Nenhum movimento ainda. Registre uma entrada, perda ou contagem acima — ou finalize uma venda no checkout.</Muted>
        ) : (
          <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, boxShadow: "0 16px 34px -16px rgba(0,0,0,.85)", overflow: "hidden" }}>
            {movements.slice(0, 12).map((m, i) => {
              const meta = MV[m.type] || MV.entrada;
              return (
                <div key={m.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "11px 16px", borderTop: i ? `1px solid ${C.lineSoft}` : "none" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 8.5, padding: "3px 7px", borderRadius: 4, fontFamily: MONO, fontWeight: 600, letterSpacing: 0.5, color: meta.color, border: `1px solid ${meta.color}` }}>{meta.badge}</span>
                    <span style={{ fontSize: 13.5, color: C.ink }}>{nameOf(m.productId)}</span>
                  </div>
                  <span style={{ fontFamily: MONO, fontSize: 14, color: meta.color, fontWeight: 600 }}>{meta.sign}{m.qty}</span>
                </div>
              );
            })}
          </div>
        )}
        <div style={{ marginTop: 14, fontSize: 11.5, color: C.inkSoft, border: `1px dashed ${C.line}`, borderRadius: 8, padding: "13px 15px", background: C.card }}>
          Cada linha é um registro em inventory_movements. Com 3-5 barbeiros, esse rastro é o que revela perdas e some-some — e vira um relatório de perdas que justifica a mensalidade.
        </div>
      </div>
    </div>
  );
}

function EditForm({ draft, field, save, cancel, title }) {
  return (
    <div style={{ background: C.card, border: `1px solid ${C.brass}`, borderTop: `3px solid ${C.brass}`, borderRadius: 12, boxShadow: "0 16px 34px -16px rgba(0,0,0,.85)", padding: 20, marginBottom: 12 }}>
      <div style={{ fontFamily: SERIF, fontWeight: 600, fontSize: 17, color: C.ink, marginBottom: 16 }}>{title}</div>
      <div className="rg" style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 12, marginBottom: 14 }}>
        {field("Nome", "name")}
        {field("Preço (R$)", "price", { type: "number", ph: "0,00" })}
        {field("Custo (R$)", "cost", { type: "number" })}
        {field("Estoque mín.", "min", { type: "number" })}
      </div>
      <div className="rg" style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: 12, marginBottom: 18 }}>
        {field("Estoque atual", "stock", { type: "number", ph: "ex: 25" })}
        {field("Fornecedor", "supplier")}
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={save} style={btnPrimary}><Save size={15} /> Salvar</button>
        <button onClick={cancel} style={btnGhost}>Cancelar</button>
      </div>
    </div>
  );
}

function Stat({ label, v, strong, color }) {
  return (
    <div style={{ textAlign: "right" }}>
      <div style={{ fontSize: 9, color: C.inkSoft, letterSpacing: 1, textTransform: "uppercase", fontFamily: SANS }}>{label}</div>
      <div style={{ fontFamily: MONO, fontSize: strong ? 19 : 14, color: color || C.ink, fontWeight: strong ? 600 : 400, marginTop: 2 }}>{v}</div>
    </div>
  );
}

function Row({ k, v, muted, tag }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", fontSize: 13, color: muted ? C.inkSoft : C.ink }}>
      <span style={{ display: "flex", alignItems: "center", gap: 7 }}>{k}{tag && <span style={{ fontSize: 8.5, padding: "2px 5px", borderRadius: 4, fontFamily: MONO, background: "rgba(44,114,216,.16)", color: C.brass }}>{tag}</span>}</span>
      <span style={{ fontFamily: MONO }}>{v}</span>
    </div>
  );
}
function Kpi({ label, value, color, icon: Icon, sub, highlight }) {
  return (
    <div style={{ background: C.card, border: `1px solid ${highlight ? C.ox : C.line}`, borderTop: `3px solid ${color}`, borderRadius: 12, boxShadow: "0 16px 34px -16px rgba(0,0,0,.85)", padding: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <span style={{ fontSize: 10.5, letterSpacing: 2, textTransform: "uppercase", color: C.inkSoft, fontWeight: 600 }}>{label}</span>
        <Icon size={17} color={color} />
      </div>
      <div style={{ fontFamily: MONO, fontWeight: 600, fontSize: 30, color, lineHeight: 1 }}>{value}</div>
      <div style={{ fontSize: 11, color: C.inkSoft, marginTop: 6, fontStyle: "italic" }}>{sub}</div>
    </div>
  );
}
function Panel({ title, children }) {
  return (
    <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, boxShadow: "0 16px 34px -16px rgba(0,0,0,.85)", padding: 20 }}>
      <div style={{ fontSize: 10.5, letterSpacing: 2, textTransform: "uppercase", color: C.brass, marginBottom: 12, fontWeight: 600 }}>{title}</div>
      {children}
    </div>
  );
}
const Muted = ({ children }) => <div style={{ fontSize: 12.5, color: C.inkSoft, fontStyle: "italic" }}>{children}</div>;
const Empty = ({ msg }) => <div style={{ padding: 40, textAlign: "center", color: C.inkSoft }}>{msg}</div>;

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(BarbeariaOS));
</script>
</body>
</html>
